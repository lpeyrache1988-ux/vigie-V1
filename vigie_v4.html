<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Vigie — Copilote citoyen</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Outfit',sans-serif;background:#f0f4ff;color:#111827;min-height:100vh}

/* ── NAV ── */
.nav{background:#1a3fad;display:flex;padding:0 4px}
.nav-btn{flex:1;padding:12px 4px 10px;border:none;background:none;color:rgba(255,255,255,.6);font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .12s}
.nav-btn.on{color:#fff;border-bottom:3px solid #fff}
.nav-ico{font-size:18px;line-height:1}

/* ── VIEWS ── */
.view{display:none;padding:16px 14px 60px}
.view.on{display:block}

/* ── HEADER ── */
.hero{background:linear-gradient(135deg,#1a3fad,#2563eb);padding:20px 18px 24px;color:#fff;margin:-16px -14px 16px}
.hero-logo{font-size:18px;font-weight:900;margin-bottom:4px}
.hero-tag{font-size:12px;opacity:.7;margin-bottom:14px}
.search-row{display:flex;gap:8px}
.si{flex:1;padding:12px 14px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-size:15px;color:#111827;outline:none}
.sb{padding:12px 16px;background:#fff;color:#1a3fad;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:6px 12px;border-radius:999px;border:2px solid #e5e7eb;background:#fff;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer;white-space:nowrap}
.fb.on{background:#1a3fad;border-color:#1a3fad;color:#fff}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:14px 10px 12px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .12s;-webkit-tap-highlight-color:transparent}
.card:active,.card.active{border-color:#1a3fad;background:#eff6ff;transform:scale(.97)}
.card.hidden{display:none}
.ci{font-size:24px;line-height:1}
.cl{font-size:12px;font-weight:700;line-height:1.3}
.cs{font-size:10px;color:#9ca3af;line-height:1.3}

/* ── QUESTIONS ── */
.quiz-panel{background:#fff;border-radius:18px;border:2px solid #1a3fad;padding:18px;margin-bottom:14px;animation:pop .2s ease}
.quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.quiz-emoji{font-size:28px}
.quiz-title{font-size:15px;font-weight:800;color:#1a3fad;line-height:1.3;flex:1}
.quiz-close{background:none;border:none;font-size:18px;color:#9ca3af;cursor:pointer}
.question-block{margin-bottom:14px}
.q-label{font-size:13px;font-weight:700;color:#111827;margin-bottom:8px}
.q-options{display:flex;flex-direction:column;gap:6px}
.q-opt{
  padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;
  font-size:13px;font-weight:600;color:#374151;cursor:pointer;
  text-align:left;background:#fff;font-family:'Outfit',sans-serif;
  transition:all .12s;
}
.q-opt:hover,.q-opt.sel{border-color:#1a3fad;background:#eff6ff;color:#1a3fad}
.quiz-progress{display:flex;gap:4px;margin-bottom:14px}
.qp-dot{flex:1;height:4px;border-radius:999px;background:#e5e7eb;transition:background .2s}
.qp-dot.done{background:#1a3fad}
.quiz-cta{width:100%;padding:13px;background:#1a3fad;color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.quiz-cta:disabled{opacity:.4;cursor:not-allowed}

/* ── RESULT ── */
.result-panel{background:#fff;border-radius:18px;border-left:5px solid #1a3fad;padding:18px;margin-bottom:14px;animation:pop .2s ease;display:none}
.result-panel.show{display:block}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rp-title{font-size:15px;font-weight:800;color:#1a3fad;flex:1;line-height:1.3;padding-right:8px}
.rp-close{background:none;border:none;font-size:18px;color:#9ca3af;cursor:pointer}
.urgency{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:12px}
.ur{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.ua{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.ub{background:#eff6ff;color:#1a3fad;border:1px solid #bfdbfe}
.ug{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.bt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:8px}
.steps{display:grid;gap:7px;margin-bottom:12px}
.step{display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.5}
.sn{width:22px;height:22px;border-radius:999px;background:#1a3fad;color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;flex-shrink:0;margin-top:2px}
.dbox{padding:9px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#78350f;margin-bottom:12px;line-height:1.5}
.wbox{padding:9px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:12px;color:#991b1b;margin-bottom:12px;line-height:1.5;font-weight:600}
.recs{display:grid;gap:6px;margin-bottom:12px}
.recs a{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;text-decoration:none;color:#111827;font-size:13px;font-weight:600}
.rb{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0;border:1px solid}
.rb1{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.rb2{background:#fffbeb;color:#d97706;border-color:#fde68a}
.rb3{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.create-dossier-btn{width:100%;padding:11px;border:2px solid #1a3fad;border-radius:12px;background:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#1a3fad;cursor:pointer}

/* ── TIMELINE ── */
.tl{position:relative;padding-left:28px;margin-bottom:4px}
.tl::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:#e5e7eb}
.tl-item{position:relative;padding:10px 0 10px 16px;margin-left:-16px}
.tl-dot{
  position:absolute;left:0;top:14px;
  width:18px;height:18px;border-radius:999px;
  display:grid;place-items:center;font-size:9px;z-index:1;
  flex-shrink:0;
}
.tl-dot.done{background:#16a34a;border:2px solid #16a34a;color:#fff}
.tl-dot.now{background:#1a3fad;border:2px solid #1a3fad;color:#fff;box-shadow:0 0 0 4px rgba(26,63,173,.2)}
.tl-dot.urgent{background:#dc2626;border:2px solid #dc2626;color:#fff;animation:pulse 1.5s infinite}
.tl-dot.future{background:#fff;border:2px solid #d1d5db;color:#9ca3af}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.tl-content{padding:8px 12px;background:#fff;border-radius:10px;border:1px solid #e5e7eb}
.tl-content.tl-now{border-color:#1a3fad;background:#eff6ff}
.tl-content.tl-urgent{border-color:#dc2626;background:#fef2f2}
.tl-content.tl-done{opacity:.65}
.tl-date{font-size:10px;font-weight:700;color:#9ca3af;margin-bottom:2px;font-family:monospace}
.tl-title{font-size:13px;font-weight:700;color:#111827;margin-bottom:3px}
.tl-desc{font-size:12px;color:#6b7280;line-height:1.4}
.tl-badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;margin-top:4px}
.badge-legal{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.badge-rec{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.badge-info{background:#eff6ff;color:#1a3fad;border:1px solid #bfdbfe}

/* ── DASHBOARD ── */
.dos-card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dos-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dos-icon{font-size:26px}
.dos-title{font-size:14px;font-weight:800;flex:1}
.dos-date{font-size:11px;color:#9ca3af}
.dos-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.dbr{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.dba{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.dbg{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.dos-progress{height:6px;background:#f3f4f6;border-radius:999px;overflow:hidden;margin-bottom:8px}
.dos-bar{height:100%;background:#1a3fad;border-radius:999px;transition:width .4s}
.dos-next{font-size:12px;color:#6b7280}
.dos-next strong{color:#1a3fad}
.dos-open-btn{width:100%;margin-top:10px;padding:9px;border:1px solid #e5e7eb;border-radius:10px;background:#f9fafb;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#374151;cursor:pointer}
.empty-state{text-align:center;padding:40px 20px;color:#9ca3af}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-t{font-size:16px;font-weight:700;margin-bottom:6px;color:#6b7280}

/* ── MISC ── */
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:10px}
.footer-note{text-align:center;font-size:11px;color:#9ca3af;padding:8px 0 4px;line-height:1.5}
</style>
</head>
<body>

<!-- ═══ NAVIGATION ═══ -->
<div class="nav">
  <button class="nav-btn on" onclick="showView('home')" id="nav-home">
    <div class="nav-ico">🔍</div>Recherche
  </button>
  <button class="nav-btn" onclick="showView('timeline')" id="nav-timeline">
    <div class="nav-ico">📅</div>Timeline
  </button>
  <button class="nav-btn" onclick="showView('dashboard')" id="nav-dashboard">
    <div class="nav-ico">📁</div>Dossiers
  </button>
</div>

<!-- ═══════════════════════════════════════════════════
     VUE 1 — RECHERCHE + QUESTIONS + RÉSULTAT
═══════════════════════════════════════════════════ -->
<div class="view on" id="view-home">
  <div class="hero">
    <div class="hero-logo">🛡️ Vigie</div>
    <div class="hero-tag">Face à l'administration, vous n'êtes pas seul.</div>
    <div class="search-row">
      <input class="si" id="q" placeholder="Décrivez votre problème…" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="sb" onclick="doSearch()">→</button>
    </div>
  </div>

  <!-- Quiz d'affinage -->
  <div id="quiz-panel" class="quiz-panel" style="display:none"></div>

  <!-- Résultat -->
  <div id="result-panel" class="result-panel"></div>

  <!-- Filtres thèmes -->
  <div class="filters" id="filters"></div>
  <div class="section-lbl" id="slbl">Choisissez votre situation</div>
  <div class="cards" id="cards"></div>

  <div class="footer-note">ℹ️ Information générale — pas un conseil juridique.<br>Délais indicatifs — vérifiez votre courrier officiel.</div>
</div>

<!-- ═══════════════════════════════════════════════════
     VUE 2 — TIMELINE
═══════════════════════════════════════════════════ -->
<div class="view" id="view-timeline">
  <div class="section-lbl">Calculer ma timeline</div>

  <!-- Sélection situation -->
  <div style="background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:16px;margin-bottom:12px">
    <label style="font-size:13px;font-weight:700;display:block;margin-bottom:8px">Ma situation</label>
    <select id="tl-situation" style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e5e7eb;font-family:'Outfit',sans-serif;font-size:14px;color:#111827;outline:none" onchange="updateTimeline()">
      <option value="">-- Choisir --</option>
      <optgroup label="💰 Impôts">
        <option value="impots_rect">Impôts — Proposition de rectification reçue</option>
        <option value="impots_satd">Impôts — Saisie bancaire (SATD)</option>
        <option value="impots_taxe">Impôts — Taxe foncière contestée</option>
      </optgroup>
      <optgroup label="👶 CAF">
        <option value="caf_indu">CAF — Trop-perçu / Indu</option>
        <option value="caf_apl">CAF — APL suspendue</option>
        <option value="caf_rsa">CAF — RSA suspendu</option>
      </optgroup>
      <optgroup label="💼 France Travail">
        <option value="ft_radiation">France Travail — Radiation</option>
        <option value="ft_are">France Travail — ARE refusée</option>
      </optgroup>
      <optgroup label="🏦 Banque">
        <option value="fraude_cb">Banque — Fraude carte bancaire</option>
        <option value="virement_fraude">Banque — Virement frauduleux</option>
        <option value="surendettement">Banque — Surendettement</option>
      </optgroup>
      <optgroup label="🏠 Logement">
        <option value="expulsion">Logement — Expulsion / Commandement</option>
        <option value="caution">Logement — Dépôt de garantie</option>
      </optgroup>
      <optgroup label="🩺 Santé">
        <option value="cpam">CPAM — Remboursement refusé</option>
        <option value="ald">CPAM — ALD refusée</option>
      </optgroup>
      <optgroup label="🛒 Consommation">
        <option value="garantie">Consommation — Garantie refusée</option>
        <option value="demarchage">Consommation — Démarchage abusif</option>
      </optgroup>
      <optgroup label="⚖️ Justice">
        <option value="injonction">Justice — Injonction de payer</option>
      </optgroup>
    </select>

    <label style="font-size:13px;font-weight:700;display:block;margin:12px 0 8px">Date de réception du courrier</label>
    <input type="date" id="tl-date" style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e5e7eb;font-family:'Outfit',sans-serif;font-size:14px;color:#111827;outline:none" onchange="updateTimeline()">
  </div>

  <div id="timeline-output"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     VUE 3 — DASHBOARD
═══════════════════════════════════════════════════ -->
<div class="view" id="view-dashboard">
  <div class="section-lbl">Mes dossiers en cours</div>
  <div id="dashboard-list"></div>

  <!-- Dossier ouvert -->
  <div id="dossier-detail" style="display:none">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <button onclick="closeDossier()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280">←</button>
      <div id="dd-title" style="font-size:16px;font-weight:800;flex:1"></div>
    </div>
    <div id="dd-timeline"></div>
    <button onclick="deleteDossier()" style="width:100%;margin-top:12px;padding:10px;border:1px solid #fecaca;border-radius:10px;background:none;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:#dc2626;cursor:pointer">🗑️ Supprimer ce dossier</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// DONNÉES : situations + questions + timelines
// ════════════════════════════════════════════════════

const SITUATIONS = {
  impots_rect:{
    emoji:'💰', label:'Impôts — Rectification', cat:'Impots',
    questions:[
      {id:'motif', q:'Pourquoi contestez-vous ?',opts:['Erreur sur mes revenus déclarés','Frais professionnels non pris en compte','Je ne comprends pas les motifs','Je pense avoir raison mais je veux vérifier']},
      {id:'montant', q:'Quel est le montant réclamé ?',opts:['Moins de 500€','De 500€ à 3 000€','De 3 000€ à 15 000€','Plus de 15 000€']},
      {id:'delai', q:'Quel délai vous reste-t-il pour répondre ?',opts:['Plus de 2 semaines','Moins de 2 semaines','Le délai est dépassé','Je ne sais pas']},
    ],
    getResult:(ans)=>({
      title:'Impôts — Plan d\'action personnalisé',
      urgency: ans.delai==='Moins de 2 semaines'?'r': ans.delai==='Le délai est dépassé'?'r':'a',
      urg: ans.delai==='Le délai est dépassé'?'🚨 Délai dépassé — saisissez le médiateur de Bercy immédiatement': ans.delai==='Moins de 2 semaines'?'🔴 Moins de 2 semaines — répondez cette semaine':'⏱️ Vous avez du temps — préparez une réponse solide',
      warning: ans.montant==='Plus de 15 000€'?'⚠️ Enjeu élevé : consultez un avocat fiscaliste avant de répondre.':null,
      steps:[
        '1. Rassemblez tous vos justificatifs : avis d\'imposition, bulletins de salaire, relevés bancaires',
        ans.motif==='Frais professionnels non pris en compte'?'2. Rédigez une liste détaillée des frais avec preuves (notes de frais, justificatifs)':'2. Rédigez votre réponse point par point en citant chaque erreur avec preuves',
        '3. Envoyez en recommandé avec AR à votre SIP (Service des Impôts des Particuliers)',
        ans.delai==='Le délai est dépassé'?'4. Saisissez le médiateur de Bercy — il peut intervenir même après le délai':'4. Conservez la preuve d\'envoi et notez la date',
        '5. Demandez un accusé de réception de votre courrier au SIP',
      ],
      delay:'Délai de réponse indicatif : généralement 30 jours à compter de la réception du courrier de l\'administration. Vérifiez la date exacte sur votre courrier.',
      recours:[
        {l:'Réclamation impots.gouv.fr',u:'https://www.impots.gouv.fr/particulier/deposer-une-reclamation',b:'rb1',bl:'Étape 1'},
        {l:'Médiateur de Bercy',u:'https://www.economie.gouv.fr/mediateur/je-saisis-le-mediateur',b:'rb2',bl:'Étape 2'},
        {l:'Tribunal administratif',u:'https://www.service-public.fr/particuliers/vosdroits/F2026',b:'rb3',bl:'Étape 3'},
      ]
    }),
    timeline:[
      {j:0, label:'Réception du courrier', desc:'Lire attentivement, noter la date limite de réponse, conserver précieusement', type:'now'},
      {j:3, label:'Analyser le courrier', desc:'Identifier chaque point contestable, rassembler les justificatifs correspondants', type:'action', badge:'info'},
      {j:7, label:'Rédiger la réponse', desc:'Réponse point par point avec preuves à l\'appui — soyez factuel et précis', type:'action', badge:'info'},
      {j:14, label:'Envoyer en recommandé avec AR', desc:'Envoi au SIP (Service des Impôts des Particuliers) de votre département', type:'action', badge:'rec'},
      {j:30, label:'⚠️ Date limite de réponse', desc:'Délai indicatif — vérifiez la date exacte sur votre courrier. Après ce délai, la rectification est tacitement acceptée.', type:'urgent', badge:'legal'},
      {j:45, label:'Relance si pas de réponse', desc:'Contactez le SIP pour vérifier la réception de votre courrier', type:'action', badge:'info'},
      {j:60, label:'Médiateur de Bercy si blocage', desc:'Si la réclamation est rejetée ou sans réponse : saisir le médiateur (gratuit)', type:'action', badge:'rec'},
      {j:180, label:'Tribunal administratif', desc:'Dernier recours si médiation infructueuse — délai total 2 ans depuis l\'imposition', type:'action', badge:'legal'},
    ]
  },

  impots_satd:{
    emoji:'🔒', label:'Impôts — SATD (Saisie)', cat:'Impots',
    questions:[
      {id:'connait', q:'Reconnaissez-vous la dette ?',opts:['Je reconnais la dette','Je conteste en partie','Je ne dois rien — c\'est une erreur','J\'ai déjà payé']},
      {id:'urgence', q:'Avez-vous accès à votre compte bancaire ?',opts:['Mon compte est totalement bloqué','Une partie seulement est bloquée','Pas encore bloqué mais j\'ai reçu l\'avis']},
      {id:'ressources', q:'Êtes-vous dans une situation financière difficile ?',opts:['Oui — revenus très limités','Situation moyenne','Je peux payer mais en plusieurs fois','Je peux payer en totalité']},
    ],
    getResult:(ans)=>({
      title:'SATD — Plan d\'action urgent',
      urgency:'r', urg:'🚨 Agir immédiatement — chaque jour compte',
      warning: ans.connait==='J\'ai déjà payé'?'⚠️ Si vous avez déjà payé, fournissez immédiatement la preuve au SIP — la saisie sera levée rapidement.':null,
      steps:[
        '1. Appelez ou allez au guichet de votre SIP le jour même en expliquant la situation',
        ans.connait==='Je ne dois rien — c\'est une erreur'?'2. Apportez TOUTES les preuves que vous ne devez pas cette somme':'2. Demandez un échelonnement de paiement par écrit',
        ans.ressources==='Oui — revenus très limités'?'3. Mentionnez votre situation financière — un sursis peut être accordé':'3. Proposez un calendrier de remboursement réaliste',
        '4. Demandez une lettre de mainlevée si accord trouvé',
        '5. Si refus injustifié : médiateur de Bercy dans les 48h',
      ],
      delay:'La saisie peut être levée en 24 à 48h si vous apportez la preuve du paiement ou obtenez un accord. Indicatif.',

const CATS=['Tout','Impots','CAF','Banque','Logement','Travail','Sante','Retraite','Conso','Identite','Justice','Arnaques'];
const CLABELS={Tout:'Tout',Impots:'💰 Impôts',CAF:'👶 CAF',Banque:'🏦 Banque',Logement:'🏠 Logement',Travail:'💼 Travail',Sante:'🩺 Santé',Retraite:'👴 Retraite',Conso:'🛒 Conso',Identite:'🪪 Identité',Justice:'⚖️ Justice',Arnaques:'⚠️ Arnaques'};
let af='Tout';
const fe=document.getElementById('filters');
CATS.forEach(c=>{
  const b=document.createElement('button');
  b.className='fb'+(c==='Tout'?' on':'');
  b.innerHTML=CLABELS[c];
  b.onclick=()=>{
    af=c;
    document.querySelectorAll('.fb').forEach(x=>x.classList.toggle('on',x===b));
    document.getElementById('slbl').innerHTML=CLABELS[c];
    document.querySelectorAll('.card').forEach(x=>x.classList.toggle('hidden',c!=='Tout'&&x.dataset.cat!==c));
    // Close quiz/result
    document.getElementById('quiz-panel').style.display='none';
    document.getElementById('result-panel').classList.remove('show');
  };
  fe.appendChild(b);
});

const grid=document.getElementById('cards');
CARDS.forEach((d,i)=>{
  const c=document.createElement('div');
  c.className='card';c.dataset.cat=d.cat;c.dataset.id=d.id;
  c.innerHTML='<div class="ci">'+d.e+'</div><div class="cl">'+d.l.replace('\n','<br>')+'</div><div class="cs">'+d.s+'</div>';
  c.onclick=()=>selectSituation(d.id,c);
  grid.appendChild(c);
});

// ════════════════════════════════════════════════════
// SÉLECTION D'UNE SITUATION → QUIZ
// ════════════════════════════════════════════════════
function selectSituation(sitId, cardEl){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  if(cardEl) cardEl.classList.add('active');
  currentSitId = sitId;
  quizAnswers = {};
  quizStep = 0;
  document.getElementById('result-panel').classList.remove('show');

  const sit = SITUATIONS[sitId];
  if(sit && sit.questions && sit.questions.length){
    renderQuiz(sit);
    document.getElementById('quiz-panel').style.display='block';
    document.getElementById('quiz-panel').scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    document.getElementById('quiz-panel').style.display='none';
    showSimpleResult(sitId);
  }
}

function renderQuiz(sit){
  const panel = document.getElementById('quiz-panel');
  const q = sit.questions[quizStep];
  const total = sit.questions.length;
  const pct = quizStep;

  panel.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-emoji">${sit.emoji}</div>
      <div class="quiz-title">${sit.label}</div>
      <button class="quiz-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="quiz-progress">
      ${sit.questions.map((_,i)=>`<div class="qp-dot${i<quizStep?' done':''}"></div>`).join('')}
    </div>
    <div style="font-size:11px;color:#9ca3af;margin-bottom:12px">Question ${quizStep+1} sur ${total}</div>
    <div class="question-block">
      <div class="q-label">${q.q}</div>
      <div class="q-options">
        ${q.opts.map(opt=>`<button class="q-opt" onclick="selectAnswer('${q.id}','${opt.replace(/'/g,"\\'")}',this)">${opt}</button>`).join('')}
      </div>
    </div>
    <button class="quiz-cta" id="quiz-next" onclick="nextQuestion()" disabled>
      ${quizStep === total-1 ? 'Voir mon plan d\'action →' : 'Question suivante →'}
    </button>
  `;
}

function selectAnswer(qid, value, btn){
  quizAnswers[qid] = value;
  document.querySelectorAll('.q-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('quiz-next').disabled = false;
}

function nextQuestion(){
  const sit = SITUATIONS[currentSitId];
  if(!sit) return;
  quizStep++;
  if(quizStep >= sit.questions.length){
    // Afficher le résultat
    document.getElementById('quiz-panel').style.display='none';
    const result = sit.getResult(quizAnswers);
    showResult(result, currentSitId);
  } else {
    renderQuiz(sit);
  }
}

function closeQuiz(){
  document.getElementById('quiz-panel').style.display='none';
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
}

// ════════════════════════════════════════════════════
// AFFICHAGE RÉSULTAT
// ════════════════════════════════════════════════════
function showResult(r, sitId){
  const panel = document.getElementById('result-panel');
  const uc = {r:'ur',a:'ua',b:'ub',g:'ug'}[r.urgency]||'ub';
  const stepsHtml = r.steps.map((s,i)=>`<div class="step"><div class="sn">${i+1}</div><div>${s}</div></div>`).join('');
  const recoursHtml = r.recours.map(rc=>`<a href="${rc.u}" target="_blank" rel="noopener">${rc.l}<span class="rb ${rc.b}">${rc.bl}</span></a>`).join('');

  panel.innerHTML = `
    <div class="rp-top">
      <div class="rp-title">${r.title}</div>
      <button class="rp-close" onclick="closeResult()">✕</button>
    </div>
    ${r.warning?`<div class="wbox">⚠️ ${r.warning}</div>`:''}
    <div class="urgency ${uc}">${r.urg}</div>
    <div class="bt">Plan d'action personnalisé</div>
    <div class="steps">${stepsHtml}</div>
    <div class="dbox">⏱️ ${r.delay}</div>
    <div class="bt">Recours disponibles</div>
    <div class="recs">${recoursHtml}</div>
    <button class="create-dossier-btn" onclick="createDossier('${sitId}')">📁 Créer un dossier de suivi pour cette situation</button>
  `;
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function showSimpleResult(sitId){
  const r = SIMPLE_RESULTS[sitId];
  if(!r) return;
  showResult(r, sitId);
}

function closeResult(){
  document.getElementById('result-panel').classList.remove('show');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
}

function n(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ');}

function doSearch(){
  const q = document.getElementById('q').value.trim();
  if(!q) return;
  const qn = n(q);
  let best=null, bs=0, bi=-1;
  Object.entries(KW).forEach(([id,kws])=>{
    const sc = kws.filter(k=>qn.includes(n(k))).reduce((a,k)=>a+k.length,0);
    if(sc>bs){bs=sc;best=id;}
  });
  if(best){
    const cardEl = document.querySelector(`.card[data-id="${best}"]`);
    af='Tout';
    document.querySelectorAll('.fb').forEach((b,i)=>b.classList.toggle('on',i===0));
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('hidden'));
    selectSituation(best, cardEl);
  } else {
    document.getElementById('result-panel').innerHTML = `
      <div class="rp-top"><div class="rp-title">🤔 Situation non reconnue</div><button class="rp-close" onclick="closeResult()">✕</button></div>
      <p style="font-size:14px;color:#6b7280;margin-bottom:12px;line-height:1.5">Essayez de choisir une carte ci-dessous ou utilisez ces recours universels :</p>

      </div>`;
    document.getElementById('result-panel').classList.add('show');
    document.getElementById('result-panel').scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function updateTimeline(){
  const sitId = document.getElementById('tl-situation').value;
  const dateStr = document.getElementById('tl-date').value;
  const out = document.getElementById('timeline-output');

  if(!sitId){ out.innerHTML=''; return; }

  const sit = SITUATIONS[sitId];
  if(!sit || !sit.timeline){ out.innerHTML='<p style="color:#9ca3af;font-size:14px;padding:20px 0">Timeline non disponible pour cette situation. Bientôt disponible.</p>'; return; }

  const dateRef = dateStr ? new Date(dateStr) : null;
  const today = new Date();
  today.setHours(0,0,0,0);

  let html = `<div style="font-size:15px;font-weight:800;margin-bottom:14px;color:#1a3fad">${sit.emoji} ${sit.label}</div>`;

  if(dateRef){
    html += `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:#1a3fad;font-weight:600">📅 Référence : courrier reçu le <strong>${dateRef.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}</strong></div>`;
  } else {
    html += `<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:#78350f">⬆️ Indiquez la date de réception pour voir les dates exactes</div>`;
  }

  html += '<div class="tl">';

  sit.timeline.forEach(item=>{
    let itemDate = null;
    if(dateRef){
      itemDate = new Date(dateRef);
      itemDate.setDate(itemDate.getDate() + item.j);
    }

    let status = 'future';
    if(dateRef){
      if(itemDate < today) status = 'done';
      else if(item.j === 0) status = 'now';
      else{
        const daysLeft = Math.ceil((itemDate - today) / 86400000);
        if(daysLeft <= 7 && item.badge === 'legal') status = 'urgent';
        else if(item.j === 0 || item.type === 'now') status = 'now';
      }
    } else {
      status = item.type || 'future';
    }

    const dotClass = status;
    const contentClass = status==='urgent'?'tl-urgent':status==='done'?'tl-done':status==='now'?'tl-now':'';
    const dotLabel = status==='done'?'✓':status==='urgent'||status==='now'?'!':'·';

    let badgeHtml = '';
    if(item.badge){
      const badgeTxt = {legal:'⚠️ Délai légal',rec:'Action recommandée',info:'Information'}[item.badge]||item.badge;
      badgeHtml = `<span class="tl-badge badge-${item.badge}">${badgeTxt}</span>`;
    }

    const dateLabel = itemDate ? `<div class="tl-date">${item.j === 0 ? 'J+0 — ' : `J+${item.j} — `}${itemDate.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}</div>` : `<div class="tl-date">J+${item.j}</div>`;

    html += `
      <div class="tl-item">
        <div class="tl-dot ${dotClass}">${dotLabel}</div>
        <div class="tl-content ${contentClass}">
          ${dateLabel}
          <div class="tl-title">${item.label}</div>
          <div class="tl-desc">${item.desc}</div>
          ${badgeHtml}
        </div>
      </div>`;
  });

  html += '</div>';

  html += `
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      <button onclick="saveDossierFromTimeline('${sitId}')" style="flex:1;padding:11px;background:#1a3fad;color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer">
        📁 Sauvegarder comme dossier
      </button>
    </div>
    <div style="font-size:11px;color:#9ca3af;margin-top:10px;line-height:1.5">
      ⚠️ Les délais affichés sont indicatifs. Vérifiez toujours les dates exactes sur votre courrier officiel.
    </div>`;

  out.innerHTML = html;
}

function saveDossierFromTimeline(sitId){
  const dateStr = document.getElementById('tl-date').value;
  createDossierWithDate(sitId, dateStr);
  showView('dashboard');
}

function createDossier(sitId){
  const dateStr = new Date().toISOString().split('T')[0];
  createDossierWithDate(sitId, dateStr);
  showView('dashboard');
}

function createDossierWithDate(sitId, dateStr){
  const sit = SITUATIONS[sitId];
  const card = CARDS.find(c=>c.id===sitId);
  const label = sit ? sit.label : (card ? card.l.replace('\n',' ') : sitId);
  const emoji = sit ? sit.emoji : (card ? card.e : '📋');

  const dos = {
    id: 'dos_'+Date.now(),
    sitId,
    label,
    emoji,
    dateReception: dateStr || new Date().toISOString().split('T')[0],
    createdAt: new Date().toISOString(),
    stepsDone: [],
  };
  dossiers.unshift(dos);
  saveDossiers();
}

function saveDossiers(){
  localStorage.setItem('vigie_v3_dossiers', JSON.stringify(dossiers));
}

function renderDashboard(){
  const list = document.getElementById('dashboard-list');
  const detail = document.getElementById('dossier-detail');
  if(openDossierId){ detail.style.display='block'; list.style.display='none'; return; }
  detail.style.display='none'; list.style.display='block';

  if(!dossiers.length){
    list.innerHTML = `<div class="empty-state"><div class="empty-ico">📁</div><div class="empty-t">Aucun dossier</div><p style="font-size:13px;color:#9ca3af;line-height:1.5">Créez un dossier depuis une situation ou la timeline pour suivre l'avancement de votre procédure.</p></div>`;
    return;
  }

  list.innerHTML = dossiers.map(dos=>{
    const sit = SITUATIONS[dos.sitId];
    const tl = sit && sit.timeline ? sit.timeline : [];
    const today = new Date(); today.setHours(0,0,0,0);
    const dateRef = dos.dateReception ? new Date(dos.dateReception) : null;

    // Calcul de l'avancement
    let nextStep = null;
    let urgentStep = null;
    let pct = 0;

    if(tl.length && dateRef){
      const done = tl.filter(t => dos.stepsDone.includes(t.label)).length;
      pct = Math.round(done/tl.length*100);

      const remaining = tl.filter(t => !dos.stepsDone.includes(t.label));
      nextStep = remaining[0] || null;

      const urgentItems = remaining.filter(t=>{
        const d = new Date(dateRef);
        d.setDate(d.getDate()+t.j);
        const dl = Math.ceil((d-today)/86400000);
        return dl <= 14 && t.badge === 'legal';
      });
      urgentStep = urgentItems[0] || null;
    }

    const badge = urgentStep ? `<span class="dos-badge dbr">⚠️ Urgent</span>` : pct===100 ? `<span class="dos-badge dbg">✅ Terminé</span>` : `<span class="dos-badge dba">En cours</span>`;

    return `<div class="dos-card">
      <div class="dos-top">
        <div class="dos-icon">${dos.emoji}</div>
        <div>
          <div class="dos-title">${dos.label}</div>
          <div class="dos-date">Courrier reçu le ${dos.dateReception ? new Date(dos.dateReception).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) : 'date inconnue'}</div>
        </div>
        ${badge}
      </div>
      ${tl.length ? `<div class="dos-progress"><div class="dos-bar" style="width:${pct}%"></div></div>` : ''}
      ${nextStep ? `<div class="dos-next">Prochaine étape : <strong>${nextStep.label}</strong></div>` : ''}
      ${urgentStep ? `<div style="font-size:12px;color:#dc2626;font-weight:700;margin-top:4px">⚠️ Délai urgent : ${urgentStep.label}</div>` : ''}
      <button class="dos-open-btn" onclick="openDossier('${dos.id}')">📅 Voir la timeline →</button>
    </div>`;
  }).join('');
}

function openDossier(dosId){
  openDossierId = dosId;
  const dos = dossiers.find(d=>d.id===dosId);
  if(!dos) return;

  document.getElementById('dashboard-list').style.display='none';
  document.getElementById('dossier-detail').style.display='block';
  document.getElementById('dd-title').textContent = dos.emoji + ' ' + dos.label;

  const sit = SITUATIONS[dos.sitId];
  if(!sit || !sit.timeline){ document.getElementById('dd-timeline').innerHTML='<p style="color:#9ca3af;font-size:14px">Timeline non disponible.</p>'; return; }

  const dateRef = dos.dateReception ? new Date(dos.dateReception) : null;
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '<div class="tl">';

  sit.timeline.forEach(item=>{
    const isDone = dos.stepsDone.includes(item.label);
    let itemDate = null;
    if(dateRef){ itemDate = new Date(dateRef); itemDate.setDate(itemDate.getDate()+item.j); }

    const daysLeft = itemDate ? Math.ceil((itemDate-today)/86400000) : null;
    let status = isDone ? 'done' : (daysLeft !== null && daysLeft <= 0 && item.badge==='legal') ? 'urgent' : item.type==='now' ? 'now' : 'future';

    const dotLabel = isDone ? '✓' : status==='urgent' ? '!' : '·';
    const contentClass = isDone ? 'tl-done' : status==='urgent' ? 'tl-urgent' : status==='now' ? 'tl-now' : '';
    const dateLabel = itemDate ? `<div class="tl-date">J+${item.j} — ${itemDate.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}${daysLeft !== null && !isDone ? ` (${daysLeft>0?`dans ${daysLeft}j`:daysLeft===0?'aujourd\'hui':Math.abs(daysLeft)+'j de retard'})` : ''}</div>` : `<div class="tl-date">J+${item.j}</div>`;

    let badgeHtml = '';
    if(item.badge){ const bt = {legal:'⚠️ Délai légal',rec:'Recommandé',info:'Info'}[item.badge]||''; badgeHtml = `<span class="tl-badge badge-${item.badge}">${bt}</span>`; }

    html += `
      <div class="tl-item">
        <div class="tl-dot ${isDone?'done':status}"><span>${dotLabel}</span></div>
        <div class="tl-content ${contentClass}" style="cursor:pointer" onclick="toggleStep('${dosId}','${item.label.replace(/'/g,"\\'")}')">
          ${dateLabel}
          <div class="tl-title">${item.label}</div>
          <div class="tl-desc">${item.desc}</div>
          ${badgeHtml}
          <div style="font-size:11px;margin-top:6px;color:${isDone?'#16a34a':'#9ca3af'}">${isDone?'✓ Étape accomplie — cliquer pour décocher':'○ Cliquer pour marquer comme fait'}</div>
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('dd-timeline').innerHTML = html;
}

function toggleStep(dosId, stepLabel){
  const dos = dossiers.find(d=>d.id===dosId);
  if(!dos) return;
  const idx = dos.stepsDone.indexOf(stepLabel);
  if(idx>=0) dos.stepsDone.splice(idx,1);
  else dos.stepsDone.push(stepLabel);
  saveDossiers();
  openDossier(dosId);
}

function closeDossier(){
  openDossierId = null;
  renderDashboard();
}

function deleteDossier(){
  if(!confirm('Supprimer ce dossier ?')) return;
  dossiers = dossiers.filter(d=>d.id!==openDossierId);
  saveDossiers();
  openDossierId = null;
  renderDashboard();
  closeDossier();
}
